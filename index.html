<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Gỗ Lũa Thuỷ Sinh</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
height:60px;
background:#fff;
position:sticky;
top:0;
z-index:999;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.logo{
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
}

.sidebar{
width:250px;
background:#fff;
height:calc(100vh - 60px);
overflow:auto;
position:sticky;
top:60px;
border-right:1px solid #eee;
}

.folder{
padding:12px;
cursor:pointer;
border-bottom:1px solid #f3f3f3;
}

.folder:hover{
background:#f5f5f5;
}

.folder.active{
background:#0068ff;
color:white;
}

.content{
flex:1;
padding:10px;
}

.gallery{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(160px,1fr));
gap:10px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,.08);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
display:block;
}

.card-name{
padding:8px;
font-size:12px;
}

.loader{
text-align:center;
padding:20px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
z-index:9999;
}

.modal img{
    max-width:95%;
    max-height:95vh;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:block;
    background:#fff;
}

.close{
position:absolute;
top:15px;
right:20px;
font-size:40px;
color:white;
cursor:pointer;
}

@media(max-width:768px){

.container{
display:block;
}

.sidebar{
width:100%;
height:180px;
position:relative;
top:0;
}

.gallery{
grid-template-columns:
repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="header">
<div class="logo">
GỖ LŨA THUỶ SINH
</div>
</div>

<div class="container">

<div
class="sidebar"
id="folderList">

Đang tải danh mục...

</div>

<div class="content">

<div
class="gallery"
id="gallery">
</div>

<div
class="loader"
id="loader">
</div>

</div>

</div>

<div
class="modal"
id="modal">

<span
class="close"
onclick="closeModal()">

&times;

</span>

<img id="modalImg">

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyipdL4XGA-Rm-HqPvXhXISuPQKS2KBbD_cOgz-aaKgnUovqSRBbTo-LKiVHhDIoyS_Dg/exec";

let currentFolder = "";
let currentPage = 1;
let loading = false;
let hasMore = true;

loadFolders();

async function loadFolders(){

const res =
await fetch(
API_URL +
"?action=folders"
);

const folders =
await res.json();

document
.getElementById("folderList")
.innerHTML =
folders.map(f=>`

<div
class="folder"
onclick="selectFolder(
'${f.id}',
this
)">

📁 ${f.name}

</div>

`).join("");

}

async function selectFolder(
folderId,
el
){

document
.querySelectorAll(".folder")
.forEach(x=>
x.classList.remove("active")
);

el.classList.add("active");

currentFolder =
folderId;

currentPage = 1;

hasMore = true;

document
.getElementById("gallery")
.innerHTML = "";

loadMore();

}

async function loadMore(){

if(
loading ||
!hasMore
) return;

loading = true;

document
.getElementById("loader")
.innerHTML =
"Đang tải...";

const res =
await fetch(

API_URL +
"?action=images" +
"&folderId=" +
currentFolder +
"&page=" +
currentPage

);

const data =
await res.json();

const gallery =
document.getElementById("gallery");

const images =
Array.isArray(data)
? data
: (data.items || []);

images.forEach(img=>{
gallery.innerHTML += `

<div
class="card"
onclick="openModal(
'${img.full}'
)">

<img
loading="lazy"
src="${img.thumb}">

<div
class="card-name">

${img.name}

</div>

</div>

`;

});

hasMore = false;

currentPage++;

loading = false;

document
.getElementById("loader")
.innerHTML =
hasMore
?
"Cuộn xuống để tải tiếp..."
:
"Đã tải hết";

}

window.addEventListener(
"scroll",
()=>{

if(
window.innerHeight +
window.scrollY
>=
document.body.offsetHeight
- 800
){

loadMore();

}

}
);

function openModal(src){

    console.log("OPEN:", src);

    const img = document.getElementById("modalImg");

    img.onload = () => {
        console.log("Ảnh tải thành công");
    };

    img.onerror = (e) => {
        console.error("Lỗi tải ảnh", e);
    };

    img.src = src;

    document.getElementById("modal").style.display = "block";
}

function closeModal(){

document
.getElementById("modal")
.style.display =
"none";

}

</script>

</body>
</html>
