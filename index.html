<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Gỗ Lũa Thuỷ Sinh</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.header{
    height:60px;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    position:sticky;
    top:0;
    z-index:999;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.container{
    display:flex;
    min-height:calc(100vh - 60px);
}

/* MENU */

.sidebar{
    width:260px;
    background:#fff;
    border-right:1px solid #e5e5e5;
    overflow:auto;
    position:sticky;
    top:60px;
    height:calc(100vh - 60px);
}

.sidebar-title{
    padding:15px;
    font-weight:bold;
    border-bottom:1px solid #eee;
}

.folder{
    padding:12px 15px;
    cursor:pointer;
    border-bottom:1px solid #f3f3f3;
    transition:.2s;
}

.folder:hover{
    background:#f4f7ff;
}

.folder.active{
    background:#0068ff;
    color:#fff;
}

/* CONTENT */

.content{
    flex:1;
    padding:15px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    cursor:pointer;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

.card-name{
    padding:10px;
    font-size:13px;
    word-break:break-word;
}

/* LOADING */

.loading{
    text-align:center;
    padding:30px;
    font-size:18px;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    z-index:9999;
}

.modal img{
    max-width:95%;
    max-height:95vh;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.close{
    position:absolute;
    top:15px;
    right:25px;
    color:#fff;
    font-size:40px;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:220px;
        position:relative;
        top:0;
    }

    .gallery{
        grid-template-columns:repeat(2,1fr);
    }

}

</style>
</head>
<body>

<div class="header">
    <div class="logo">GỖ LŨA THUỶ SINH</div>
</div>

<div class="container">

    <div class="sidebar">

        <div class="sidebar-title">
            Danh mục
        </div>

        <div id="folderList">
            <div class="loading">
                Đang tải danh mục...
            </div>
        </div>

    </div>

    <div class="content">

        <div id="gallery">

            <div class="loading">
                Chọn danh mục để xem ảnh
            </div>

        </div>

    </div>

</div>

<div id="modal" class="modal">

    <span class="close" onclick="closeModal()">
        &times;
    </span>

    <img id="modalImg">

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxMYAOMytjvcFMJdsFqpwu9LAj7bPGV3c8cinQu1Vj0/dev";

loadFolders();

async function loadFolders(){

    try{

        const response =
        await fetch(
            API_URL + "?action=folders"
        );

        const folders =
        await response.json();

        if(!Array.isArray(folders)){

            document.getElementById(
                "folderList"
            ).innerHTML =
            "<div class='loading'>Lỗi tải danh mục</div>";

            console.log(folders);

            return;
        }

        let html = "";

        folders.forEach(folder=>{

            html += `
            <div
                class="folder"
                onclick="loadImages('${folder.id}',this)"
            >
                📁 ${folder.name}
            </div>
            `;

        });

        document.getElementById(
            "folderList"
        ).innerHTML = html;

    }
    catch(err){

        console.error(err);

        document.getElementById(
            "folderList"
        ).innerHTML =
        "<div class='loading'>Không kết nối được API</div>";

    }

}

async function loadImages(folderId,el){

    document
    .querySelectorAll(".folder")
    .forEach(x=>x.classList.remove("active"));

    el.classList.add("active");

    document.getElementById(
        "gallery"
    ).innerHTML =
    "<div class='loading'>Đang tải ảnh...</div>";

    try{

        const response =
        await fetch(
            API_URL +
            "?action=images&folderId=" +
            folderId
        );

        const images =
        await response.json();

        if(!Array.isArray(images)){

            document.getElementById(
                "gallery"
            ).innerHTML =
            "<div class='loading'>Không có dữ liệu</div>";

            console.log(images);

            return;
        }

        let html =
        '<div class="gallery">';

        images.forEach(img=>{

            html += `
            <div
                class="card"
                onclick="openModal('${img.full}')"
            >
                <img
                    loading="lazy"
                    src="${img.thumb}"
                >

                <div class="card-name">
                    ${img.name}
                </div>
            </div>
            `;

        });

        html += "</div>";

        document.getElementById(
            "gallery"
        ).innerHTML = html;

    }
    catch(err){

        console.error(err);

        document.getElementById(
            "gallery"
        ).innerHTML =
        "<div class='loading'>Lỗi tải ảnh</div>";

    }

}

function openModal(src){

    document.getElementById(
        "modal"
    ).style.display = "block";

    document.getElementById(
        "modalImg"
    ).src = src;

}

function closeModal(){

    document.getElementById(
        "modal"
    ).style.display = "none";

}

document.getElementById("modal")
.addEventListener("click",function(e){

    if(e.target.id==="modal")
        closeModal();

});

</script>

</body>
</html>
